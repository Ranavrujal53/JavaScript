<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    // frist      
    let a = "100";

    let num = Number(a);

    console.log(num);
    console.log(typeof num);

    // second
    let result = "10" - 5;
    console.log(result);

    // third
    console.log(Number(""));

    // forth
    console.log(Number("100abc"));

    // 5
    console.log(Number("50px"));
    console.log(parseInt("50px"));

    // Binary Number Conversion
    console.log(Number("0b1010"));

    // Boolean Arithmetic
    let total = true + true + false;
    console.log(total);

    // Array to Number
    console.log(Number([10]));
    console.log(Number([10,20]));

    // Scientific Notation
    console.log(Number("1e3"));
    // 1e3 means 1 × 10³

    
</script>
<body>
    
</body>
</html>
