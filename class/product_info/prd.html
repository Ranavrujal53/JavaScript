<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Data</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container{
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .form-box{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 20px;
        }

        .input-group{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 8px;
            font-weight: bold;
            color: #334155;
        }

        input{
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus{
            border-color: #2563eb;
        }

        button{
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            background: linear-gradient(to right,#2563eb,#7c3aed);
            color: white;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.02);
        }

        table{
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px;
        }

        table th{
            background: #0f172a;
            color: white;
            padding: 15px;
        }

        table td{
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover{
            background: #f1f5f9;
        }

        .grand-total{
            margin-top: 20px;
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            color: #2563eb;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Product Billing System</h1>

        <div class="form-box">

            <div class="input-group">
                <label for="name">Customer Name</label>
                <input type="text" id="name">
            </div>

            <div class="input-group">
                <label for="prname">Product Name</label>
                <input type="text" id="prname">
            </div>

            <div class="input-group">
                <label for="qty">Quantity</label>
                <input type="number" id="qty">
            </div>

            <div class="input-group">
                <label for="price">Price</label>
                <input type="number" id="price">
            </div>

        </div>

        <button onclick="addRecord()">Add Record</button>

        <table>

            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="record">

            </tbody>

        </table>

        <div class="grand-total">
            Grand Total : ₹ <span id="grandtotal">0</span>
        </div>

    </div>

    <script>

        let grandTotal = 0;

        function addRecord(){

            let name = document.getElementById("name").value;
            let prname = document.getElementById("prname").value;
            let qty = document.getElementById("qty").value;
            let price = document.getElementById("price").value;

            let total = qty * price;

            grandTotal += total;

            let row = `
            
                <tr>
                    <td>${name}</td>
                    <td>${prname}</td>
                    <td>${qty}</td>
                    <td>₹ ${price}</td>
                    <td>₹ ${total}</td>
                </tr>

            `;

            document.getElementById("record").innerHTML += row;

            document.getElementById("grandtotal").innerHTML = grandTotal;

            document.getElementById("name").value = "";
            document.getElementById("prname").value = "";
            document.getElementById("qty").value = "";
            document.getElementById("price").value = "";

        }

    </script>

</body>
</html>
