<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Billing System</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-box{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input{
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        input:focus{
            border-color: #007bff;
        }

        .add-btn{
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .add-btn:hover{
            background: #0056b3;
        }

        table{
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        table th{
            background: #007bff;
            color: white;
            padding: 14px;
        }

        table td{
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        table tr:nth-child(even){
            background: #f9f9f9;
        }

        .delete-btn{
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: crimson;
            color: white;
            cursor: pointer;
        }

        .delete-btn:hover{
            background: darkred;
        }

        .grand-total{
            margin-top: 25px;
            text-align: right;
            font-size: 28px;
            font-weight: bold;
            color: green;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Product Billing System</h1>

        <div class="form-box">

            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name" placeholder="Enter customer name">
            </div>

            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="prname" placeholder="Enter product name">
            </div>

            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="qty" placeholder="Enter quantity">
            </div>

            <div class="input-group">
                <label>Price</label>
                <input type="number" id="price" placeholder="Enter price">
            </div>

        </div>

        <button class="add-btn" onclick="addRecord()">
            Add Record
        </button>

        <table>

            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="record">

            </tbody>

        </table>

        <div class="grand-total">
            Grand Total : ₹ <span id="grandtotal">0</span>
        </div>

    </div>

    <script>

        let grandTotal = 0;

        function addRecord(){

            let name =
            document.getElementById("name").value;

            let prname =
            document.getElementById("prname").value;

            let qty =
            Number(document.getElementById("qty").value);

            let price =
            Number(document.getElementById("price").value);

            let total = qty * price;

            grandTotal += total;

            let row = `

                <tr>

                    <td>${name}</td>

                    <td>${prname}</td>

                    <td>${qty}</td>

                    <td>₹ ${price}</td>

                    <td>${total}</td>

                    <td>
                        <button class="delete-btn"
                        onclick="deleteRow(this, ${total})">
                        Delete
                        </button>
                    </td>

                </tr>

            `;

            document.getElementById("record").innerHTML += row;

            document.getElementById("grandtotal").innerText =
            grandTotal;

            document.getElementById("name").value = "";

            document.getElementById("prname").value = "";

            document.getElementById("qty").value = "";

            document.getElementById("price").value = "";

        }

        function deleteRow(button, total){

            button.parentElement.parentElement.remove();

            grandTotal -= total;

            document.getElementById("grandtotal").innerText =
            grandTotal;

        }

    </script>

</body>
</html>
