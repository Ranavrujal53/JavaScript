<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.quiz-box{
    width:90%;
    max-width:700px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.timer{
    font-size:20px;
    font-weight:bold;
    color:red;
    margin-bottom:15px;
}

#counter{
    margin-bottom:10px;
}

progress{
    width:100%;
    height:20px;
    margin-bottom:20px;
}

#question{
    margin-bottom:20px;
}

.option{
    display:block;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#f1f1f1;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

.result{
    text-align:center;
}

.result h1{
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="quiz-box">

    <div class="timer">
        ⏰ Time Left:
        <span id="timer">6:00</span>
    </div>

    <h3 id="counter"></h3>

    <progress id="progressBar" value="0" max="20"></progress>

    <h2 id="question"></h2>

    <div id="options"></div>

    <button onclick="nextQuestion()">Next</button>

</div>

<script>

const quizQuestions = [
{
question:"What does HTML stand for?",
options:["Hyper Text Markup Language","High Text Machine Language","Hyper Transfer Markup Language","Home Tool Markup Language"],
answer:"Hyper Text Markup Language"
},
{
question:"Which language is used for styling web pages?",
options:["HTML","JQuery","CSS","XML"],
answer:"CSS"
},
{
question:"Which language is used for web development?",
options:["Python","JavaScript","C++","Java"],
answer:"JavaScript"
},
{
question:"Which symbol is used for comments in JavaScript?",
options:["//","##","<!-- -->","**"],
answer:"//"
},
{
question:"What is the correct way to declare a variable in JavaScript?",
options:["var x;","int x;","string x;","declare x;"],
answer:"var x;"
},
{
question:"Which method displays data in the console?",
options:["print()","console.log()","document.write()","alert()"],
answer:"console.log()"
},
{
question:"Which company developed JavaScript?",
options:["Microsoft","Google","Netscape","Apple"],
answer:"Netscape"
},
{
question:"What is the result of 2 + '2' in JavaScript?",
options:["4","22","Error","NaN"],
answer:"22"
},
{
question:"Which keyword is used to define a constant?",
options:["var","let","const","constant"],
answer:"const"
},
{
question:"What is the output of typeof null?",
options:["null","object","undefined","string"],
answer:"object"
},
{
question:"Which loop executes at least once?",
options:["for","while","do...while","foreach"],
answer:"do...while"
},
{
question:"Which array method adds an element at the end?",
options:["push()","pop()","shift()","unshift()"],
answer:"push()"
},
{
question:"Which array method removes the last element?",
options:["push()","pop()","shift()","splice()"],
answer:"pop()"
},
{
question:"Which operator checks value and datatype?",
options:["==","=","===","!="],
answer:"==="
},
{
question:"What is the default value of an uninitialized variable?",
options:["0","null","undefined","false"],
answer:"undefined"
},
{
question:"Which function converts a string to an integer?",
options:["parseInt()","toString()","Number()","parseFloat()"],
answer:"parseInt()"
},
{
question:"Which method converts JSON text into an object?",
options:["JSON.parse()","JSON.stringify()","parseJSON()","toObject()"],
answer:"JSON.parse()"
},
{
question:"Which event occurs when a button is clicked?",
options:["onload","onmouseover","onclick","onchange"],
answer:"onclick"
},
{
question:"Which keyword refers to the current object?",
options:["self","current","this","object"],
answer:"this"
},
{
question:"Which method is used to join array elements into a string?",
options:["concat()","join()","slice()","split()"],
answer:"join()"
}
];

let currentQuestion = 0;
let score = 0;
let timeLeft = 360;

// Timer
const timer = setInterval(() => {

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    document.getElementById("timer").innerText =
        `${minutes}:${seconds}`;

    timeLeft--;

    if(timeLeft < 0){
        finishQuiz();
    }

},1000);

// Load Question
function loadQuestion(){

    let q = quizQuestions[currentQuestion];

    document.getElementById("counter").innerText =
        `Question ${currentQuestion + 1} of ${quizQuestions.length}`;

    document.getElementById("progressBar").value =
        currentQuestion + 1;

    document.getElementById("question").innerText =
        q.question;

    let optionsHTML = "";

    q.options.forEach(option => {

        optionsHTML += `
            <label class="option">
                <input type="radio"
                       name="answer"
                       value="${option}">
                ${option}
            </label>
        `;

    });

    document.getElementById("options").innerHTML =
        optionsHTML;
}

// Next Question
function nextQuestion(){

    let selected =
    document.querySelector('input[name="answer"]:checked');

    if(!selected){
        alert("Please select an answer!");
        return;
    }

    if(selected.value === quizQuestions[currentQuestion].answer){
        score++;
    }

    currentQuestion++;

    if(currentQuestion < quizQuestions.length){
        loadQuestion();
    }
    else{
        finishQuiz();
    }
}

// Finish Quiz
function finishQuiz(){

    clearInterval(timer);

    let percentage =
    ((score / quizQuestions.length) * 100).toFixed(2);

    document.querySelector(".quiz-box").innerHTML = `
        <div class="result">
            <h1>🎉 Quiz Completed</h1>

            <h2>Score: ${score}/${quizQuestions.length}</h2>

            <h2>Percentage: ${percentage}%</h2>

            <h3>✅ Correct Answers: ${score}</h3>

            <h3>❌ Wrong Answers:
            ${quizQuestions.length - score}</h3>
        </div>
    `;
}

// Start Quiz
loadQuestion();

</script>

</body>
</html>
