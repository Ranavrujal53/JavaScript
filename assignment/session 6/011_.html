<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Box</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding-top: 50px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 28px;
        }

        input {
            width: 280px;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        #moodbox {
            width: 310px;
            height: 180px;
            margin-top: 30px;
            border-radius: 16px;
            background-color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: background-color 0.4s ease, transform 0.3s ease;
        }
        
        #moodbox:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <h2>Color Mood Box</h2>

    <input type="text" id="colorinput" placeholder="Enter a color (e.g., tomato, #3498db)" oninput="changecolor()">

    <div id="moodbox"></div>

    <script>
        function changecolor() {
            let color = document.getElementById("colorinput").value;
            document.getElementById("moodbox").style.backgroundColor = color;
        }
    </script>
</body>

</html>
