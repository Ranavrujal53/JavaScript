<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Playing</title>

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #0f0c20, #15102a, #06040a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .player {
            width: 360px;
            padding: 35px 25px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .player:hover {
            transform: translateY(-5px);
        }

        /* Vinyl/Disc Placeholder Effect */
        .disc-art {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, #1db954, #126830);
            border-radius: 50%;
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 25px rgba(29, 185, 84, 0.3);
            animation: spin 12s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h2 {
            color: #ffffff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 20px 0;
            opacity: 0.6;
        }

        p {
            margin: 0;
            color: #b3b3b3;
            font-size: 14px;
        }

        #song-title {
            display: block;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 8px;
            min-height: 35px;
            transition: opacity 0.2s ease;
        }

        button {
            margin-top: 30px;
            padding: 14px 32px;
            border: none;
            background: #ffffff;
            color: #0f0c20;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            background: #1db954;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(29, 185, 84, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="player">
        <h2>Now Playing</h2>
        
        <div class="disc-art">🎵</div>

        <p>
            Song
            <span id="song-title">Kesariya</span>
        </p>

        <button onclick="changeSong()">
            Next Song
        </button>
    </div>

    <script>
        const songs = [
            "Shri Ram Jai Ram Jai Jai Ram",
            "Ram Siya Ram",
            "Raghupati Raghav Raja Ram",
            "Mere Ghar Ram Aaye Hain",
            "Jai Shri Ram",
            "Hanuman Chalisa",
            "Bajrang Baan",
            "Sankat Mochan Hanuman Ashtak",
            "Jai Hanuman Gyan Gun Sagar",
            "Pawan Putra Hanuman",
            "Veer Hanumana",
            "Shree Hanuman Vandana",
            "Ram Lakshman Janaki",
            "Shri Ramchandra Kripalu Bhajman",
            "Jai Bajrangbali",
            "Hey Ram Hey Ram",
            "Ram Naam Ke Heere Moti",
            "Hanuman Amritwani",
            "Siya Ram May Sab Jag Jani",
            "Ram Darbar Bhajan"
        ];

        let index = 0;

        function changeSong() {
            index++;

            if (index >= songs.length) {
                index = 0;
            }

            document.getElementById("song-title").innerHTML = songs[index];
        }
    </script>

</body>

</html>
