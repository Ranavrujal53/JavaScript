<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Function Expression</title>
</head>
<body>
    <h1> Function Expression</h1>

    <script>
        let getgreeting = function(name){
            return `Hello, ${name}`;
        };

        console.log(getgreeting('Vrujal'));
        
    </script>
</body>
</html>
