<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>math oprator</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
            linear-gradient(135deg,#0f172a,#111827,#1e293b);
            overflow: hidden;
        }

        fieldset{
            width: 420px;
            padding: 35px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            box-shadow:
            0 0 20px rgba(0,255,255,0.2),
            0 0 50px rgba(0,0,0,0.4);
            animation: glow 4s linear infinite;
        }

        @keyframes glow{
            0%{
                box-shadow:
                0 0 20px rgba(0,255,255,0.2),
                0 0 50px rgba(0,0,0,0.4);
            }

            50%{
                box-shadow:
                0 0 30px rgba(255,0,255,0.4),
                0 0 60px rgba(0,0,0,0.5);
            }

            100%{
                box-shadow:
                0 0 20px rgba(0,255,255,0.2),
                0 0 50px rgba(0,0,0,0.4);
            }
        }

        legend{
            padding: 0 15px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        label{
            display: block;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
        }

        input[type="text"]{
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 16px;
            transition: 0.4s;
            border: 1px solid transparent;
        }

        input[type="text"]:focus{
            border: 1px solid cyan;
            transform: scale(1.03);
            box-shadow: 0 0 15px cyan;
        }

        input[type="text"]::placeholder{
            color: #cccccc;
        }

        input[type="button"]{
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg,#00c6ff,#0072ff,#8e2de2);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        input[type="button"]:hover{
            transform: translateY(-3px) scale(1.03);
            box-shadow:
            0 0 15px #00c6ff,
            0 0 30px #8e2de2;
        }

        #result{
            margin-top: 30px;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 18px;
            line-height: 2;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.03);
        }

    </style>

</head>
<body>

    <fieldset>
        <legend>Simple calc</legend>

        <label for="">Enter number 1</label>
        <input type="text" name="" id="num1" placeholder="Enter first number">

        <label for="">Enter number 2</label>
        <input type="text" name="" id="num2" placeholder="Enter second number">

        <input type="button" value="submit" onclick="simplecalc()">

        <div id="result"></div>
    </fieldset>

    <script>
        function simplecalc(){
            let num1 = +document.getElementById("num1").value;
            let num2 = +document.getElementById("num2").value;

            let str=`
            Add = ${num1+num2}<br>
            Sub = ${num1-num2}<br>
            Mul = ${num1*num2}<br>
            Div = ${num1/num2}<br>
            Mod = ${num1%num2}
            `
            document.getElementById('result').innerHTML=str;
        }

        // let m=10
        // m+=20
        // console.log(m);

    </script>
</body>
</html>
