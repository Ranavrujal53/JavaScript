<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Hello, world!</h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

   <button onclick="getProduct(printProduct)">
        click
   </button>
   <div class="container border">
        <div class="row flex gap-3" id="pdata"></div>
   </div>
    <script>
        function getProduct(cb){
            fetch('https://fakestoreapi.com/products')
                .then(response => response.json())
                .then(data => cb(data))
                .catch(err=>console.log(err)
                );
        }
        function printProduct(products){
            let str="";
            products.forEach((index,i)=>{
                 
                  str+=`
                  <div class="card" style="width: 18rem;">
                    <img src="${index.image}" class="card-img-top" alt="..." height="200px">
                    <div class="card-body">
                        <h5 class="card-title">${index.title}</h5>
                        <p>${index.price}</p>
                        <a href="#" class="btn btn-primary">Addtocart</a>
                    </div>
                    </div>
                  `
            })
            console.log(str);
            document.getElementById('pdata').innerHTML=str
            
        }
    </script>
  </body>
</html>
