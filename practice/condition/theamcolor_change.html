<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theam color chnage</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#0f172a,#1e293b);
        }

        #main{
            width: 500px;
            padding: 35px;
            border-radius: 20px;
            background: white;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            transition: 0.5s;
        }

        h1{
            margin-bottom: 25px;
            color: #111827;
            font-size: 35px;
        }

        p{
            margin-top: 25px;
            font-size: 17px;
            line-height: 1.8;
        }

        .btn-box{
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button{
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: translateY(-3px);
        }

        .dark-btn{
            background: #111827;
            color: white;
        }

        .dark-btn:hover{
            background: black;
        }

        .light-btn{
            background: #e5e7eb;
            color: #111827;
        }

        .light-btn:hover{
            background: #cbd5e1;
        }

    </style>

</head>
<body>

    <div id="main">

        <h1>Theme Changer</h1>

        <div class="btn-box">
            <button class="dark-btn" onclick="themechange('dark')">Dark</button>

            <button class="light-btn" onclick="themechange('light')">Light</button>
        </div>

        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Deleniti maiores commodi necessitatibus illum impedit at quasi,
            aliquid accusamus quod suscipit, nobis placeat ipsam?
            Dicta doloremque ipsam necessitatibus esse quasi eaque!
        </p>

    </div>

    <script>
        function themechange(theme){
            let divid = document.getElementById("main");
            if(theme == "dark"){
                divid.style.backgroundColor="gray";
                divid.style.color="white";
            }
            else if(theme =="light"){
                divid.style.backgroundColor="white";
                divid.style.color="gray";
            }
            else{
                divid.style.backgroundColor="white";
                divid.style.color="gray";
            }
        }
    </script>
</body>
</html>
