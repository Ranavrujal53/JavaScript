<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Eligible</title>
</head>
<body>
    <fieldset>
        <label for="">Age</label>
        <input type="text" name="age" id="age">
        <input type="button" value="submit" onclick="checkage()">
    </fieldset>

    <script>
        function checkage(){
            let age = document.getElementById("age").value

            if(age>18){
                alert("Eligible")
            }

            else{
                alert("not Eligible")
            }
            }
    </script>
</body>
</html>
