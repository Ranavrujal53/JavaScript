<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Array CRUD</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            font-family:'Segoe UI',sans-serif;
        }

        .crud-card{
            width:100%;
            max-width:850px;
            background:#fff;
            padding:30px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            font-weight:700;
            color:#333;
            margin-bottom:25px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:2px solid #ddd;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#667eea;
        }

        .btn{
            border-radius:12px;
            font-weight:600;
        }

        .table{
            margin-top:20px;
        }

        .table thead{
            background:#667eea;
            color:white;
        }

        .table tbody tr:hover{
            background:#f5f7ff;
            transition:0.3s;
        }

        .action-btn{
            margin:2px;
        }

        .empty-row{
            text-align:center;
            color:gray;
            font-weight:600;
            padding:20px;
        }
    </style>
</head>
<body>

    <div class="crud-card">

        <h1 class="title">🍎 Fruit Array CRUD</h1>

        <div class="row g-2">

            <div class="col-md-8">
                <input
                    type="text"
                    id="fruitname"
                    class="form-control"
                    placeholder="Enter Fruit Name">
            </div>

            <div class="col-md-4">

                <button
                    onclick="addfruit()"
                    id="addbtn"
                    class="btn btn-success w-100">
                    Add Fruit
                </button>

                <button
                    onclick="updatefruit()"
                    id="updatebtn"
                    class="btn btn-warning w-100"
                    style="display:none;">
                    Update Fruit
                </button>

            </div>

        </div>

        <table class="table table-bordered table-hover text-center align-middle">

            <thead>
                <tr>
                    <th width="10%">#</th>
                    <th width="50%">Fruit Name</th>
                    <th width="40%">Action</th>
                </tr>
            </thead>

            <tbody id="fruitTableBody"></tbody>

        </table>

    </div>

    <script>

        let fruits = [];
        let editId = null;

        function addfruit(){

            let fname = document.getElementById('fruitname').value.trim();

            if(fname === ""){
                alert("Please enter a fruit name");
                return;
            }

            fruits.push(fname);

            document.getElementById('fruitname').value = "";

            fruitshow();
        }

        function fruitshow(){

            if(fruits.length === 0){

                document.getElementById('fruitTableBody').innerHTML = `
                <tr>
                    <td colspan="3" class="empty-row">
                        No Fruits Added Yet 🍉
                    </td>
                </tr>
                `;

                return;
            }

            let str = "";

            for(let i = 0; i < fruits.length; i++){

                str += `
                <tr>
                    <td>${i + 1}</td>

                    <td>${fruits[i]}</td>

                    <td>

                        <button
                            class="btn btn-danger btn-sm action-btn"
                            onclick="delFruits(${i})">
                            Delete
                        </button>

                        <button
                            class="btn btn-primary btn-sm action-btn"
                            onclick="editFruits(${i})">
                            Edit
                        </button>

                    </td>
                </tr>
                `;
            }

            document.getElementById('fruitTableBody').innerHTML = str;
        }

        function delFruits(id){

            fruits.splice(id,1);

            fruitshow();
        }

        function editFruits(id){

            document.getElementById('fruitname').value = fruits[id];

            editId = id;

            document.getElementById('addbtn').style.display = "none";
            document.getElementById('updatebtn').style.display = "block";
        }

        function updatefruit(){

            let newFname =
            document.getElementById('fruitname').value.trim();

            if(newFname === ""){
                alert("Please enter a fruit name");
                return;
            }

            fruits.splice(editId,1,newFname);

            fruitshow();

            document.getElementById('fruitname').value = "";

            editId = null;

            document.getElementById('addbtn').style.display = "block";
            document.getElementById('updatebtn').style.display = "none";
        }

        window.onload = fruitshow;

    </script>

</body>
</html>
