<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Clock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
            background-size:300% 300%;
            animation:bgMove 10s ease infinite;
        }

        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        #clock{
            width:700px;
            max-width:95%;
            padding:40px;
            text-align:center;
            border-radius:30px;
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.3);
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        #icon{
            font-size:60px;
            margin-bottom:10px;
        }

        #title{
            color:#fff;
            font-weight:700;
            letter-spacing:3px;
            margin-bottom:10px;
        }

        #greeting{
            color:#f8fafc;
            font-size:1.2rem;
            margin-bottom:15px;
        }

        #day{
            font-size:2rem;
            font-weight:bold;
            color:#ffffff;
            text-transform:uppercase;
            letter-spacing:3px;
        }

        #date{
            font-size:1.2rem;
            color:#e2e8f0;
            margin-top:10px;
        }

        #time{
            font-size:4.5rem;
            font-weight:900;
            color:white;
            margin:20px 0;
            text-shadow:0 0 15px rgba(255,255,255,0.8);
        }

        #timezone{
            color:#f1f5f9;
            margin-top:15px;
        }

        #footer{
            margin-top:20px;
            color:#e2e8f0;
            font-size:14px;
        }

        .progress{
            height:12px;
            margin-top:20px;
            border-radius:20px;
            overflow:hidden;
        }

        .progress-bar{
            transition:0.5s;
        }

        @media(max-width:768px){
            #time{
                font-size:2.8rem;
            }

            #day{
                font-size:1.5rem;
            }

            #clock{
                padding:25px;
            }
        }
    </style>
</head>
<body>

    <div id="clock" class="container">

        <div id="icon">⏰</div>

        <h2 id="title">DIGITAL CLOCK</h2>

        <div id="greeting"></div>

        <div id="day"></div>

        <div id="date"></div>

        <div id="time"></div>

        <div id="timezone">India Standard Time (IST)</div>

        <div class="progress">
            <div id="secBar" class="progress-bar bg-success"></div>
        </div>

        <div id="footer">
            Made with HTML, CSS, Bootstrap & JavaScript
        </div>

    </div>

    <script>
        function printdate(){

            let date = new Date();

            let days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

            let hours = date.getHours();

            let ampm = hours >= 12 ? "PM" : "AM";

            let greeting = "";

            if(hours < 12){
                greeting = "Good Morning ☀️";
            }
            else if(hours < 18){
                greeting = "Good Afternoon 🌤️";
            }
            else{
                greeting = "Good Evening 🌙";
            }

            let displayHour = hours % 12;
            displayHour = displayHour || 12;

            document.getElementById("greeting").textContent = greeting;

            document.getElementById("day").textContent =
                days[date.getDay()];

            document.getElementById("date").textContent =
                `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;

            document.getElementById("time").textContent =
                `${String(displayHour).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')} ${ampm}`;

            document.getElementById("secBar").style.width =
                (date.getSeconds()/60)*100 + "%";
        }

        printdate();
        setInterval(printdate,1000);
    </script>

</body>
</html>
