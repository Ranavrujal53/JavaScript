<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Neon Smart Clock Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    transition:0.5s;
}

/* 🌌 SPACE BACKGROUND */
body::before{
    content:"";
    position:absolute;
    width:300%;
    height:300%;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15) 1px, transparent 2px),
        radial-gradient(circle at 80% 40%, rgba(255,0,255,0.12) 1px, transparent 2px),
        radial-gradient(circle at 50% 70%, rgba(0,255,100,0.1) 1px, transparent 2px);
    background-size:120px 120px;
    animation:stars 25s linear infinite;
    opacity:0.2;
    z-index:-1;
}

@keyframes stars{
    from{transform:translateY(0)}
    to{transform:translateY(-400px)}
}

/* 🌙 THEMES */
body.day{
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

body.night{
    background:radial-gradient(circle,#050505,#000);
}

/* 🔥 MAIN LAYOUT */
.main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
}

/* 🍏 APPLE WATCH STYLE CLOCK */
.clock{
    width:380px;
    height:380px;
    border-radius:50%;
    position:relative;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(15px);

    border:2px solid #0ff;

    box-shadow:
        0 0 30px rgba(0,255,255,0.6),
        inset 0 0 20px rgba(0,255,255,0.3);

    animation:float 6s ease-in-out infinite;
    cursor:grab;
}

.clock:active{
    cursor:grabbing;
}

@keyframes float{
    0%{transform:rotateY(0deg) translateY(0px)}
    50%{transform:rotateY(10deg) translateY(-8px)}
    100%{transform:rotateY(0deg) translateY(0px)}
}

/* HANDS */
.hand{
    position:absolute;
    left:50%;
    bottom:50%;
    transform-origin:bottom;
}

.hour{width:6px;height:85px;background:#0ff;margin-left:-3px;}
.minute{width:4px;height:110px;background:lime;margin-left:-2px;}
.second{width:2px;height:130px;background:red;margin-left:-1px;}

/* CENTER */
.center{
    width:14px;
    height:14px;
    background:#0ff;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px #0ff;
}

/* NUMBERS */
.number{
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:18px;
    color:white;
}

/* PANEL */
.panel{
    width:300px;
    padding:18px;
    border-radius:16px;

    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(15px);

    border:1px solid rgba(0,255,255,0.4);

    box-shadow:0 0 20px rgba(0,255,255,0.3);

    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:#0ff;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#0ff;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 10px #0ff;
}

h3{
    color:#0ff;
    text-align:center;
}

/* 📱 MOBILE */
@media (max-width:768px){
    .main{
        flex-direction:column;
    }

    .clock{
        width:320px;
        height:320px;
    }
}
</style>
</head>

<body class="night">

<div class="main">

    <!-- CLOCK -->
    <div class="clock" id="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center"></div>
    </div>

    <!-- PANEL -->
    <div class="panel">

        <button onclick="toggleTheme()">🌙 Theme</button>

        <input type="time" id="alarmTime">
        <button onclick="setAlarm()">🔔 Alarm</button>

        <button onclick="startStopwatch()">⏱ Stopwatch</button>
        <button onclick="resetStopwatch()">Reset</button>

        <button onclick="startTimer()">⏳ Timer</button>

        <h3 id="stopwatch">00:00</h3>
        <h3 id="timer">Timer: 00:00</h3>

    </div>

</div>

<audio id="tickSound" src="https://www.soundjay.com/clock/sounds/clock-ticking-1.mp3"></audio>

<script>

const clock=document.getElementById("clock");
const tick=document.getElementById("tickSound");

let alarm=localStorage.getItem("alarm");
let lastSecond=-1;

/* DRAG FEATURE */
let isDragging=false;

clock.onmousedown=()=>isDragging=true;
document.onmouseup=()=>isDragging=false;

document.onmousemove=(e)=>{
    if(isDragging){
        clock.style.position="absolute";
        clock.style.left=e.pageX-180+"px";
        clock.style.top=e.pageY-180+"px";
    }
};

/* NUMBERS */
for(let i=1;i<=12;i++){
    let n=document.createElement("div");
    n.className="number";
    n.innerText=i;

    let angle=(i-3)*Math.PI*2/12;
    let r=150;

    n.style.left=190+r*Math.cos(angle)+"px";
    n.style.top=190+r*Math.sin(angle)+"px";

    clock.appendChild(n);
}

/* CLOCK */
function updateClock(){

    let now=new Date();

    let h=now.getHours()%12;
    let m=now.getMinutes();
    let s=now.getSeconds();
    let ms=now.getMilliseconds();

    document.getElementById("hour").style.transform=`rotate(${h*30+m*0.5}deg)`;
    document.getElementById("minute").style.transform=`rotate(${m*6+s*0.1}deg)`;
    document.getElementById("second").style.transform=`rotate(${(s+ms/1000)*6}deg)`;

    /* tick */
    if(s!==lastSecond){
        try{ tick.currentTime=0; tick.play(); }catch(e){}
        lastSecond=s;
    }

    /* alarm */
    if(alarm){
        let current=now.getHours().toString().padStart(2,"0")+":"+
                    now.getMinutes().toString().padStart(2,"0");

        if(current===alarm){
            speechSynthesis.speak(new SpeechSynthesisUtterance("Wake up!"));
            alert("⏰ ALARM!");
            localStorage.removeItem("alarm");
            alarm=null;
        }
    }

    requestAnimationFrame(updateClock);
}

/* ALARM */
function setAlarm(){
    alarm=document.getElementById("alarmTime").value;
    localStorage.setItem("alarm",alarm);
    alert("Alarm Saved!");
}

/* STOPWATCH */
let sw=0,run=false;

function startStopwatch(){
    run=true;
    loop();
}

function loop(){
    if(!run) return;
    sw++;
    document.getElementById("stopwatch").innerText=
        Math.floor(sw/60)+":"+String(sw%60).padStart(2,"0");
    setTimeout(loop,1000);
}

function resetStopwatch(){
    sw=0;
    run=false;
    document.getElementById("stopwatch").innerText="00:00";
}

/* TIMER */
function startTimer(){
    let t=30;
    let x=setInterval(()=>{
        t--;
        document.getElementById("timer").innerText="Timer: "+t;

        if(t<=0){
            clearInterval(x);
            speechSynthesis.speak(new SpeechSynthesisUtterance("Timer finished"));
        }
    },1000);
}

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("day");
    document.body.classList.toggle("night");
}

/* START */
updateClock();

</script>

</body>
</html>
